---
# Selects the usable vCenter pool for placement discovery.
#
# Expects:
# - resolved_config.datacenter.vcenter_credential and vcenters
# - vault_credentials.vcenter entry for the credential key
#
# Produces:
# - vcenter_datacenter_summary
# - skipped_vcenters

- name: Validate datacenter config defines vCenter placement inputs
  ansible.builtin.assert:
    that:
      - resolved_config.datacenter.vcenter_credential is defined
      - resolved_config.datacenter.vcenter_credential | length > 0
      - resolved_config.datacenter.vcenters is defined
      - resolved_config.datacenter.vcenters | length > 0
    fail_msg: >-
      Datacenter config {{ resolved_config.datacenter.file }} must define
      vcenter_credential and at least one vCenter hostname.

- name: Validate vCenter credential exists in vault
  ansible.builtin.assert:
    that:
      - vault_credentials.vcenter is defined
      - resolved_config.datacenter.vcenter_credential in vault_credentials.vcenter
      - vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].username | default('', true) | length > 0
      - vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].password | default('', true) | length > 0
    fail_msg: >-
      vCenter credential {{ resolved_config.datacenter.vcenter_credential }}
      must exist under vault_credentials.vcenter with username and password.
  no_log: true

- name: Test vCenter HTTPS reachability
  ansible.builtin.uri:
    url: "https://{{ item.hostname }}/sdk"
    validate_certs: false
    status_code: [200, 401, 403, 500, 503]
    method: GET
    timeout: 5
  loop: "{{ resolved_config.datacenter.vcenters }}"
  loop_control:
    label: "{{ item.hostname }}"
  register: _vcenter_reach_test
  failed_when: false

- name: Show vCenter reachability results
  ansible.builtin.debug:
    msg: "{{ item.item.hostname }}: status={{ item.status | default('UNREACHABLE') }}"
  loop: "{{ _vcenter_reach_test.results | default([]) }}"
  loop_control:
    label: "{{ item.item.hostname }}"

- name: Discover vSphere datacenters across configured vCenters
  community.vmware.vmware_datacenter_info:
    hostname: "{{ item.hostname }}"
    username: "{{ vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].username }}"
    password: "{{ vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].password }}"
    validate_certs: "{{ vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].validate_certs | default(false) | bool }}"
  loop: "{{ resolved_config.datacenter.vcenters }}"
  loop_control:
    label: "{{ item.hostname }}"
  register: vcenter_datacenter_results
  failed_when: false
  no_log: true

- name: Build vSphere datacenter discovery summary
  ansible.builtin.set_fact:
    vcenter_datacenter_summary: >-
      {{
        vcenter_datacenter_summary | default([])
        + [
            {
              'hostname': item.item.hostname,
              'ok': not (item.failed | default(false)) and (item.datacenter_info | default([]) | length > 0),
              'datacenter_count': item.datacenter_info | default([]) | length,
              'datacenters': item.datacenter_info | default([]) | map(attribute='name') | list,
              'error': item.msg | default('')
            }
          ]
      }}
  loop: "{{ vcenter_datacenter_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.hostname }}"

- name: Show vSphere datacenter discovery summary
  ansible.builtin.debug:
    msg: "{{ vcenter_datacenter_summary | default([]) }}"

- name: Build skipped vCenter list
  ansible.builtin.set_fact:
    skipped_vcenters: >-
      {{
        vcenter_datacenter_summary | default([])
        | rejectattr('ok')
        | map(attribute='hostname')
        | list
      }}

- name: WARNING - skipped vCenters detected
  ansible.builtin.debug:
    msg:
      - "WARNING: One or more configured vCenters were skipped."
      - "Skipped: {{ skipped_vcenters }}"
  when: skipped_vcenters | length > 0

- name: Validate at least one vSphere datacenter was discovered
  ansible.builtin.assert:
    that:
      - vcenter_datacenter_summary | default([]) | sum(attribute='datacenter_count') > 0
    fail_msg: >-
      Unable to discover any vSphere datacenters from the configured vCenters.
      Discovery summary: {{ vcenter_datacenter_summary | default([]) }}
