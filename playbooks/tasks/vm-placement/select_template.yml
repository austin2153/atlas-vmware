---
# Finds the requested VM template in vCenter.
#
# Expects:
# - resolved_config (from load_request_config)
# - vault_credentials (from vars/credentials.yml)
# - selected_cluster (from select_cluster)
#
# Template lookup:
# - Searches the folder defined by resolved_config.template.folder
# - Matches by template name from resolved_config.template.name
#
# Produces:
# - selected_template: dict with name, guest_id, folder, moid

- name: Gather template facts from vCenter
  ansible.builtin.script:
    executable: "{{ ansible_playbook_python }}"
    cmd: >-
      {{ playbook_dir }}/../scripts/vcenter_template_facts.py
      {{ selected_cluster.hostname }}
      {{ vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].username }}
      {{ vault_credentials.vcenter[resolved_config.datacenter.vcenter_credential].password }}
      {{ selected_cluster.datacenter }}
      {{ resolved_config.template.folder }}
  register: _template_facts_raw
  no_log: true

- name: Parse template facts
  ansible.builtin.set_fact:
    _template_facts: "{{ _template_facts_raw.stdout | from_json }}"

- name: Validate template facts gathered successfully
  ansible.builtin.assert:
    that:
      - _template_facts.error == ''
    fail_msg: >-
      Failed to gather template facts from {{ selected_cluster.hostname }}/{{ selected_cluster.datacenter }}.
      Error: {{ _template_facts.error }}

- name: Validate requested template exists
  ansible.builtin.assert:
    that:
      - _template_facts.templates | selectattr('name', 'eq', resolved_config.template.name) | list | length > 0
    fail_msg: >-
      Template '{{ resolved_config.template.name }}' not found in folder '{{ resolved_config.template.folder }}'
      on {{ selected_cluster.hostname }}/{{ selected_cluster.datacenter }}.
      Available templates: {{ _template_facts.templates | map(attribute='name') | list }}

- name: Select matching template
  ansible.builtin.set_fact:
    selected_template: >-
      {{
        _template_facts.templates
        | selectattr('name', 'eq', resolved_config.template.name)
        | list | first
        | combine({'hostname': selected_cluster.hostname, 'datacenter': selected_cluster.datacenter})
      }}

- name: Show selected template
  ansible.builtin.debug:
    msg:
      - "Selected template : {{ selected_template.name }}"
      - "Guest ID          : {{ selected_template.guest_id }}"
      - "Folder            : {{ selected_template.folder }}"
      - "MOID              : {{ selected_template.moid }}"
