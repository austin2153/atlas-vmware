---
# Runtime credential registry with field-level Ansible Vault encryption.
#
# Keep non-secret routing/configuration values readable. Encrypt secret values
# such as passwords and token values with !vault blocks.
#
# Encrypt a value with: ansible-vault encrypt_string 'yourvalue' --name 'fieldname'

vault_credentials:
  vcenter:
    vcsim:
      username: administrator@vsphere.local
      password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          34363364666664623464653134323462666533363534356637666530376131616437366331616531
          3233353165316233363361303938643262393862333363330a326464363364626535346432333935
          37653462643932633133303737316537653237386632326366363832353531346364646261646635
          3938613461383733620a626432653238623337613835356461383735366664656637313935343639
          3237
      validate_certs: false
